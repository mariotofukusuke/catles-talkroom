<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CATLES トークルーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#bf1a7a;--pink-light:#fff0f8;--pink-border:#f0a0d0;
  --blue-light:#f0f8ff;--blue-border:#a0c8f0;--green:#0d9e6e;
  --bg:#f5f5f5;--white:#fff;--border:#e0e0e0;--text:#1a1a1a;
  --text-sub:#666;--text-hint:#999;
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.dev-bar{width:100%;background:#1a1a1a;color:#fff;padding:8px 16px;display:flex;align-items:center;gap:10px;font-size:12px}
.dev-bar span{opacity:0.6}
.role-toggle{display:flex;gap:4px;margin-left:auto}
.role-btn{padding:4px 12px;border-radius:12px;border:1px solid #444;font-size:11px;cursor:pointer;background:transparent;color:#ccc}
.role-btn.active{background:var(--pink);border-color:var(--pink);color:#fff}
.screen{width:100%;max-width:430px;min-height:100vh;background:var(--white);display:flex;flex-direction:column}
.top-bar{padding:12px 16px 10px;border-bottom:1px solid var(--border);background:var(--white);position:sticky;top:0;z-index:10}
.top-bar-inner{display:flex;align-items:center;gap:10px}
.back-btn{width:30px;height:30px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;flex-shrink:0}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.av-buyer{background:#e8f4fd;color:#1a7abf}
.av-seller{background:#fde8f4;color:#bf1a7a}
.top-info{flex:1;min-width:0}
.top-name{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-sub{font-size:11px;color:var(--text-sub);margin-top:1px}
.status-pill{font-size:11px;padding:3px 10px;border-radius:12px;background:#e8f4fd;color:#0c447c;font-weight:500;white-space:nowrap;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--white)}
.tab{flex:1;padding:11px 0;font-size:13px;color:var(--text-sub);text-align:center;cursor:pointer;border-bottom:2.5px solid transparent}
.tab.active{color:var(--pink);border-bottom-color:var(--pink);font-weight:500}
.view{display:none;flex-direction:column;flex:1}
.view.active{display:flex}
.msgs{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px;min-height:300px}
.date-sep{text-align:center;font-size:11px;color:var(--text-hint);margin:6px 0;display:flex;align-items:center;gap:8px}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.msg-wrap{display:flex;flex-direction:column;gap:3px}
.msg-wrap.me{align-items:flex-end}
.msg-wrap.other{align-items:flex-start}
.msg-header{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-sub)}
.msg-wrap.me .msg-header{flex-direction:row-reverse}
.bubble{max-width:80%;padding:9px 12px;font-size:14px;line-height:1.65;word-break:break-word}
.bubble.me{background:var(--pink-light);border:1.5px solid var(--pink-border);color:#5a1a3a;border-radius:14px 3px 14px 14px}
.bubble.other{background:var(--blue-light);border:1.5px solid var(--blue-border);color:#1a2a5a;border-radius:3px 14px 14px 14px}
.msg-time{font-size:10px;color:var(--text-hint)}
.msg-wrap.me .msg-time{text-align:right}
.img-wrap{position:relative;display:inline-block;margin-top:6px}
.img-thumb{width:160px;height:160px;border-radius:10px;object-fit:cover;display:block;border:1px solid var(--border);cursor:pointer}
.dl-btn{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px}
.dl-btn svg{width:12px;height:12px;stroke:#fff}
.input-area{padding:8px 12px 12px;border-top:1px solid var(--border);background:var(--white)}
.prev-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.prev-item{position:relative;width:50px;height:50px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.prev-item img{width:100%;height:100%;object-fit:cover}
.prev-rm{position:absolute;top:2px;right:2px;width:15px;height:15px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-box{flex:1;display:flex;align-items:flex-end;gap:8px;background:#f5f5f5;border-radius:22px;padding:8px 14px;border:1px solid var(--border)}
#msgInput{flex:1;border:none;outline:none;background:transparent;font-size:14px;color:var(--text);resize:none;font-family:inherit;max-height:80px;line-height:1.5}
.attach-lbl{cursor:pointer;color:var(--text-sub);display:flex;align-items:center;flex-shrink:0}
#fileInput{display:none}
.send-btn{width:38px;height:38px;border-radius:50%;background:var(--pink);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn svg{stroke:#fff}
.uploading{text-align:center;padding:8px;font-size:12px;color:var(--text-sub)}
.progress-view{flex:1;overflow-y:auto;padding:16px}
.prog-title{font-size:12px;color:var(--text-sub);margin-bottom:14px;font-weight:500}
.step-row{display:flex;gap:12px}
.step-left{display:flex;flex-direction:column;align-items:center}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;border:2px solid var(--border);background:var(--white);color:var(--text-hint)}
.step-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.step-dot.now{background:var(--white);border-color:var(--green);color:var(--green)}
.step-line-v{width:2px;flex:1;min-height:24px;background:var(--border);margin:3px 0}
.step-line-v.done{background:var(--green)}
.step-right{padding:2px 0 20px}
.step-name{font-size:14px;color:var(--text-hint)}
.step-name.done{color:var(--text-sub)}
.step-name.now{color:var(--green);font-weight:600}
.step-now-label{font-size:11px;color:var(--green);margin-top:2px}
.order-card{background:#f9f9f9;border-radius:12px;padding:14px;margin-top:16px;border:1px solid var(--border)}
.seller-step-bar{border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;background:var(--white)}
.prog-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--white);font-size:13px;color:var(--text-sub);cursor:pointer;text-align:center;font-family:inherit}
.prog-btn.next{background:var(--green);border-color:var(--green);color:#fff;font-weight:500}
.files-view{flex:1;overflow-y:auto;padding:14px}
.file-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.file-icon{width:40px;height:40px;border-radius:10px;background:#e8f4fd;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-icon svg{width:20px;height:20px;stroke:#185fa5}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:11px;color:var(--text-sub);margin-top:2px}
.file-dl{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--white);font-size:11px;color:var(--text-sub);cursor:pointer;text-decoration:none;white-space:nowrap}
.hint{text-align:center;padding:24px;color:var(--text-hint);font-size:13px}
</style>
</head>
<body>
<div class="dev-bar">
  <span>開発プレビュー</span>
  <div class="role-toggle">
    <button class="role-btn active" onclick="setRole('seller',this)">出品者</button>
    <button class="role-btn" onclick="setRole('buyer',this)">購入者</button>
  </div>
</div>
<div class="screen">
  <div class="top-bar">
    <div class="top-bar-inner">
      <button class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="av av-buyer" id="topAv">さ</div>
      <div class="top-info">
        <div class="top-name" id="topName">田中 さくら さん</div>
        <div class="top-sub">注文 #2024-0411 · F4号キャンバス</div>
      </div>
      <div class="status-pill" id="statusPill">制作中</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('talk',this)">トーク</div>
    <div class="tab" onclick="switchTab('progress',this)">進捗</div>
    <div class="tab" onclick="switchTab('files',this)">ファイル</div>
  </div>
  <div class="view active" id="talkView">
    <div class="msgs" id="messages"><div class="hint">接続中...</div></div>
    <div id="uploadingBar" style="display:none" class="uploading">画像をアップロード中...</div>
    <div class="input-area">
      <div class="prev-row" id="prevRow"></div>
      <div class="input-row">
        <div class="input-box">
          <textarea id="msgInput" rows="1" placeholder="メッセージを入力..."></textarea>
          <label class="attach-lbl">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <input type="file" id="fileInput" accept="image/*" multiple>
          </label>
        </div>
        <button class="send-btn" id="sendBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="view" id="progressView">
    <div class="progress-view">
      <div class="prog-title">取引の流れ</div>
      <div id="stepList"></div>
      <div class="order-card">
        <div style="font-size:11px;color:var(--text-sub);margin-bottom:8px">注文情報</div>
        <div style="font-size:14px;color:var(--text);margin-bottom:4px">F4号キャンバス · 猫2匹</div>
        <div style="font-size:16px;font-weight:600;color:var(--text)">¥9,000</div>
        <div style="font-size:11px;color:var(--text-sub);margin-top:4px">販売日 2026年4月11日</div>
      </div>
    </div>
    <div class="seller-step-bar" id="sellerStepBar"></div>
  </div>
  <div class="view" id="filesView">
    <div class="files-view" id="filesList"><div class="hint">ファイルはトークから送信すると自動で追加されます</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAABNAG7dbMMvuVnwgYtqXvFxnzVum6nQA",
  authDomain: "catles-talkroom.firebaseapp.com",
  databaseURL: "https://catles-talkroom-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "catles-talkroom",
  storageBucket: "catles-talkroom.firebasestorage.app",
  messagingSenderId: "1078200374386",
  appId: "1:1078200374386:web:b974b2fa56c08b56b3deeb",
  measurementId: "G-C4JYMWGJHH"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const ROOM_ID = "order-2024-0411";
const steps = ['購入完了','デザイン制作中','パネル制作中','発送完了'];
const statusLabels = ['受付済み','デザイン制作中','パネル制作中','発送完了'];
let role = 'seller';
let pending = [];
let currentStep = 1;

function getDateTime() {
  const now = new Date();
  return `${now.getMonth()+1}月${now.getDate()}日 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function setRole(r, btn) {
  role = r;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const isSeller = r === 'seller';
  document.getElementById('topAv').textContent = isSeller ? 'さ' : 'C';
  document.getElementById('topAv').className = 'av ' + (isSeller ? 'av-buyer' : 'av-seller');
  document.getElementById('topName').textContent = isSeller ? '田中 さくら さん' : 'CATLES';
  document.getElementById('sellerStepBar').style.display = isSeller ? 'flex' : 'none';
}
window.setRole = setRole;

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(tab + 'View').classList.add('active');
}
window.switchTab = switchTab;

function renderSteps() {
  const list = document.getElementById('stepList');
  list.innerHTML = '';
  steps.forEach((s, i) => {
    const isDone = i < currentStep;
    const isNow = i === currentStep;
    const isLast = i === steps.length - 1;
    const row = document.createElement('div');
    row.className = 'step-row';
    row.innerHTML = `
      <div class="step-left">
        <div class="step-dot${isDone?' done':isNow?' now':''}">${isDone?'✓':i+1}</div>
        ${!isLast?`<div class="step-line-v${isDone?' done':''}"></div>`:''}
      </div>
      <div class="step-right">
        <div class="step-name${isDone?' done':isNow?' now':''}">${s}</div>
        ${isNow?'<div class="step-now-label">現在のステップ</div>':''}
      </div>`;
    list.appendChild(row);
  });
  document.getElementById('statusPill').textContent = statusLabels[currentStep];
  const bar = document.getElementById('sellerStepBar');
  bar.innerHTML = '';
  if (currentStep > 0) {
    const b = document.createElement('button');
    b.className = 'prog-btn'; b.textContent = '← 戻す';
    b.onclick = () => set(ref(db, `rooms/${ROOM_ID}/step`), currentStep - 1);
    bar.appendChild(b);
  }
  if (currentStep < steps.length - 1) {
    const b = document.createElement('button');
    b.className = 'prog-btn next'; b.textContent = '次のステップへ →';
    b.onclick = () => set(ref(db, `rooms/${ROOM_ID}/step`), currentStep + 1);
    bar.appendChild(b);
  }
}

onValue(ref(db, `rooms/${ROOM_ID}/step`), snapshot => {
  currentStep = snapshot.val() !== null ? snapshot.val() : 1;
  renderSteps();
});

onValue(ref(db, `rooms/${ROOM_ID}/messages`), snapshot => {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  const data = snapshot.val();
  if (!data) { msgs.innerHTML = '<div class="hint">メッセージはまだありません</div>'; return; }
  let lastDate = '';
  Object.values(data).forEach(msg => {
    const msgDate = msg.datetime ? msg.datetime.split(' ')[0] : '';
    if (msgDate !== lastDate) {
      const sep = document.createElement('div');
      sep.className = 'date-sep'; sep.textContent = msgDate;
      msgs.appendChild(sep); lastDate = msgDate;
    }
    const isSeller = msg.role === 'seller';
    const isMe = msg.role === role;
    const w = document.createElement('div');
    w.className = 'msg-wrap ' + (isMe ? 'me' : 'other');
    const avClass = isSeller ? 'av-seller' : 'av-buyer';
    const avText = isSeller ? 'C' : 'さ';
    const name = isSeller ? 'CATLES' : '田中 さくら';
    let imgHtml = '';
    if (msg.imageUrl) {
      imgHtml = `<div class="img-wrap">
        <img class="img-thumb" src="${msg.imageUrl}" alt="画像" onclick="window.open('${msg.imageUrl}','_blank')">
        <a class="dl-btn" href="${msg.imageUrl}" download target="_blank">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          保存
        </a>
      </div>`;
    }
    w.innerHTML = `
      <div class="msg-header" style="${isMe?'flex-direction:row-reverse':''}">
        <div class="av ${avClass}" style="width:22px;height:22px;font-size:10px">${avText}</div>
        <span>${name}</span>
      </div>
      <div class="bubble ${isMe?'me':'other'}">${msg.text?msg.text.replace(/</g,'&lt;'):''}${imgHtml}</div>
      <div class="msg-time">${msg.datetime||''}</div>`;
    msgs.appendChild(w);
  });
  msgs.scrollTop = msgs.scrollHeight;
});

onValue(ref(db, `rooms/${ROOM_ID}/files`), snapshot => {
  const list = document.getElementById('filesList');
  const data = snapshot.val();
  if (!data) { list.innerHTML = '<div class="hint">ファイルはトークから送信すると自動で追加されます</div>'; return; }
  list.innerHTML = '';
  Object.values(data).forEach(f => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `
      <div class="file-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" stroke-width="1.5"/><polyline points="21 15 16 10 5 21" stroke="currentColor" stroke-width="1.5"/></svg></div>
      <div class="file-info"><div class="file-name">${f.name}</div><div class="file-meta">${f.datetime}</div></div>
      <a class="file-dl" href="${f.url}" download target="_blank">保存</a>`;
    list.appendChild(item);
  });
});

const input = document.getElementById('msgInput');
input.addEventListener('input', () => { input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,80)+'px'; });
input.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();send();} });
document.getElementById('sendBtn').addEventListener('click', send);

document.getElementById('fileInput').addEventListener('change', e => {
  Array.from(e.target.files).forEach(f => {
    const r = new FileReader();
    r.onload = ev => { pending.push({name:f.name, file:f, url:ev.target.result}); renderPrev(); };
    r.readAsDataURL(f);
  });
  e.target.value = '';
});

function renderPrev() {
  const row = document.getElementById('prevRow');
  row.innerHTML = '';
  pending.forEach((f, i) => {
    const d = document.createElement('div'); d.className = 'prev-item';
    d.innerHTML = `<img src="${f.url}"><div class="prev-rm" data-i="${i}">×</div>`;
    row.appendChild(d);
  });
  row.querySelectorAll('.prev-rm').forEach(b => b.addEventListener('click', () => { pending.splice(+b.dataset.i,1); renderPrev(); }));
}

async function send() {
  const text = input.value.trim();
  if (!text && !pending.length) return;
  const dt = getDateTime();

  if (pending.length) {
    document.getElementById('uploadingBar').style.display = 'block';
    document.getElementById('sendBtn').disabled = true;
    for (const f of pending) {
      try {
        const storageRef = sRef(storage, `rooms/${ROOM_ID}/${Date.now()}_${f.name}`);
        await uploadBytes(storageRef, f.file);
        const url = await getDownloadURL(storageRef);
        await push(ref(db, `rooms/${ROOM_ID}/messages`), { role, text: text||'', imageUrl: url, imageName: f.name, datetime: dt });
        await push(ref(db, `rooms/${ROOM_ID}/files`), { name: f.name, url, datetime: dt });
      } catch(e) { console.error(e); }
    }
    document.getElementById('uploadingBar').style.display = 'none';
    document.getElementById('sendBtn').disabled = false;
  } else {
    push(ref(db, `rooms/${ROOM_ID}/messages`), { role, text, datetime: dt });
  }
  input.value = ''; input.style.height = 'auto';
  pending = []; renderPrev();
}

renderSteps();
document.getElementById('sellerStepBar').style.display = 'flex';
</script>
</body>
</html>
